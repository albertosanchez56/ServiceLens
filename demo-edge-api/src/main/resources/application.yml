spring:
  application:
    name: edge-api

server:
  port: 8080

demo:
  checkout:
    base-url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  level:
    root: INFO
