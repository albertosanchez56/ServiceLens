spring:
  application:
    name: checkout

server:
  port: 8081

demo:
  payment:
    base-url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  level:
    root: INFO
