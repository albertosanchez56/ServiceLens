services:
  postgres:
    image: postgres:16-alpine
    container_name: servicelens-postgres
    environment:
      POSTGRES_USER: servicelens
      POSTGRES_PASSWORD: servicelens
      POSTGRES_DB: servicelens
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicelens -d servicelens"]
      interval: 5s
      timeout: 5s
      retries: 10

  tempo:
    image: grafana/tempo:2.3.1
    container_name: servicelens-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo/traces
    ports:
      - "3200:3200"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: servicelens-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./infra/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: servicelens-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:2.9.5
    container_name: servicelens-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infra/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  # Promtail 2.9.x usa API Docker 1.42; Docker Desktop reciente exige ≥1.44 → errores en bucle.
  # Logs en Loki vía contenedores: reactivar con Grafana Alloy o Promtail 3.x cuando lo configures.
  # Mientras tanto: ver logs con `docker logs <contenedor>`; trazas/métricas no dependen de Promtail.

  grafana:
    image: grafana/grafana:11.0.0
    container_name: servicelens-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  payment:
    build:
      context: ./demo-payment
    image: servicelens/payment:local
    container_name: payment
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - otel-collector

  checkout:
    build:
      context: ./demo-checkout
    image: servicelens/checkout:local
    container_name: checkout
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - payment
      - otel-collector

  edge-api:
    build:
      context: ./demo-edge-api
    image: servicelens/edge-api:local
    container_name: edge-api
    # Host 18080 → evita choque con otra app en Windows que use :8080 (IIS, Tomcat, otro Spring…)
    ports:
      - "18080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - checkout
      - payment
      - otel-collector

  platform:
    build:
      context: ./platform
    image: servicelens/platform:local
    container_name: platform
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Dentro del contenedor localhost:9090 no es Prometheus; forzar URL del servicio compose
      SERVICELENS_PROMETHEUS_BASE_URL: http://prometheus:9090
      JWT_SECRET: "${JWT_SECRET:-dev-change-me-use-32-chars-minimum!!}"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      prometheus:
        condition: service_started

volumes:
  postgres-data:
  tempo-data:
  loki-data:
  grafana-data:
