spring:
  application:
    name: platform
  datasource:
    url: jdbc:postgresql://localhost:5432/servicelens
    username: servicelens
    password: servicelens
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8090

servicelens:
  jwt:
    secret: ${JWT_SECRET:dev-change-me-use-32-chars-minimum!!}
    expiration-seconds: 3600
  prometheus:
    base-url: http://localhost:9090
  detection:
    enabled: true
    poll-interval-ms: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  level:
    root: INFO
