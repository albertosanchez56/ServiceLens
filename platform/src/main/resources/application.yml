spring:
  application:
    name: platform
  datasource:
    url: jdbc:postgresql://localhost:5432/servicelens
    username: servicelens
    password: servicelens

server:
  port: 8090

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  level:
    root: INFO
